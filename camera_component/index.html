<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Camera Capture</title>
<style>
    :root {
        --accent-dark: #0F2027;
        --accent-mid: #203A43;
        --accent-light: #2C5364;
        --normal: #1DB954;
        --defect: #E63946;
        --panel-bg: #F7F9FA;
        --border: #DCE3E7;
    }

    * { box-sizing: border-box; }

    html, body {
        margin: 0;
        padding: 0;
        font-family: 'Segoe UI', 'Inter', sans-serif;
        background: transparent;
    }

    .camera-wrapper {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 14px;
        padding: 16px;
        background: var(--panel-bg);
        border: 1px solid var(--border);
        border-radius: 14px;
    }

    .video-stage {
        position: relative;
        width: 100%;
        max-width: 760px;
        background: #000;
        border-radius: 10px;
        overflow: hidden;
        box-shadow: 0 4px 14px rgba(0,0,0,0.25);
    }

    video, .captured-preview {
        width: 100%;
        display: block;
        max-height: 520px;
        object-fit: contain;
        background: #000;
    }

    .hidden { display: none !important; }

    .controls-row {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
        justify-content: center;
        align-items: center;
        width: 100%;
        max-width: 760px;
    }

    select {
        flex: 1 1 220px;
        padding: 8px 10px;
        border-radius: 8px;
        border: 1px solid var(--border);
        background: #FFFFFF;
        font-size: 0.9rem;
        color: var(--accent-dark);
    }

    button {
        border: none;
        cursor: pointer;
        font-weight: 700;
        font-size: 0.95rem;
        padding: 10px 22px;
        border-radius: 24px;
        color: #FFFFFF;
        transition: transform 0.08s ease, opacity 0.15s ease;
    }

    button:active { transform: scale(0.97); }
    button:disabled { opacity: 0.5; cursor: not-allowed; }

    .btn-capture {
        background: linear-gradient(90deg, var(--accent-dark), var(--accent-mid), var(--accent-light));
        padding: 12px 34px;
        font-size: 1.05rem;
    }

    .btn-retake {
        background: var(--accent-light);
    }

    .status-text {
        font-size: 0.85rem;
        color: #5A6570;
        text-align: center;
        min-height: 18px;
    }

    .status-text.error {
        color: var(--defect);
        font-weight: 600;
    }
</style>
</head>
<body>

<div class="camera-wrapper">
    <div class="video-stage">
        <video id="video" autoplay playsinline muted></video>
        <img id="capturedPreview" class="captured-preview hidden" alt="Captured connector image" />
    </div>

    <div class="controls-row" id="deviceRow">
        <select id="deviceSelect" aria-label="Select camera"></select>
    </div>

    <div class="controls-row">
        <button id="captureBtn" class="btn-capture">📸 Capture Image</button>
        <button id="retakeBtn" class="btn-retake hidden">🔄 Retake</button>
    </div>

    <div id="statusText" class="status-text">Requesting camera access…</div>
</div>

<canvas id="canvas" class="hidden"></canvas>

<script>
    /* --------------------------------------------------------------------
     * Minimal implementation of the Streamlit static-component protocol.
     * No npm build and no external component library is required: the
     * component simply exchanges postMessage events with the Streamlit
     * frontend using the same message shapes that streamlit-component-lib
     * produces internally.
     * ------------------------------------------------------------------ */
    const Streamlit = {
        _lastHeight: 0,

        sendMessage(message) {
            window.parent.postMessage(Object.assign({ isStreamlitMessage: true }, message), "*");
        },

        setComponentReady() {
            this.sendMessage({ type: "streamlit:componentReady", apiVersion: 1 });
        },

        setFrameHeight() {
            const height = document.documentElement.scrollHeight;
            if (height !== this._lastHeight) {
                this._lastHeight = height;
                this.sendMessage({ type: "streamlit:setFrameHeight", height: height });
            }
        },

        setComponentValue(value) {
            this.sendMessage({ type: "streamlit:setComponentValue", value: value, dataType: "json" });
        }
    };

    window.addEventListener("message", (event) => {
        const data = event.data || {};
        if (data.type === "streamlit:render") {
            Streamlit.setFrameHeight();
        }
    });

    /* ------------------------------------------------------------------ */
    /* Camera logic                                                       */
    /* ------------------------------------------------------------------ */
    const video = document.getElementById("video");
    const canvas = document.getElementById("canvas");
    const capturedPreview = document.getElementById("capturedPreview");
    const deviceSelect = document.getElementById("deviceSelect");
    const deviceRow = document.getElementById("deviceRow");
    const captureBtn = document.getElementById("captureBtn");
    const retakeBtn = document.getElementById("retakeBtn");
    const statusText = document.getElementById("statusText");

    let activeStream = null;

    function setStatus(text, isError) {
        statusText.textContent = text;
        statusText.classList.toggle("error", Boolean(isError));
    }

    function stopActiveStream() {
        if (activeStream) {
            activeStream.getTracks().forEach((track) => track.stop());
            activeStream = null;
        }
    }

    async function startStream(deviceId) {
        stopActiveStream();
        setStatus("Starting camera…", false);

        // Request the highest resolution the device can offer. Browsers will
        // clamp these "ideal" values down to whatever the sensor supports,
        // so this is safe across desktop webcams and mobile rear/front cameras.
        const videoConstraints = {
            width: { ideal: 4096 },
            height: { ideal: 2160 },
        };
        if (deviceId) {
            videoConstraints.deviceId = { exact: deviceId };
        } else {
            videoConstraints.facingMode = { ideal: "environment" };
        }

        try {
            const stream = await navigator.mediaDevices.getUserMedia({
                video: videoConstraints,
                audio: false,
            });
            activeStream = stream;
            video.srcObject = stream;
            await video.play();
            setStatus("Camera live — align the connector and press Capture.", false);
            await populateDeviceList();
        } catch (err) {
            setStatus("Camera access failed: " + err.message, true);
        }
        Streamlit.setFrameHeight();
    }

    async function populateDeviceList() {
        try {
            const devices = await navigator.mediaDevices.enumerateDevices();
            const videoInputs = devices.filter((d) => d.kind === "videoinput");

            if (videoInputs.length <= 1) {
                deviceRow.classList.add("hidden");
                return;
            }

            deviceRow.classList.remove("hidden");
            const currentValue = deviceSelect.value;
            deviceSelect.innerHTML = "";
            videoInputs.forEach((device, index) => {
                const option = document.createElement("option");
                option.value = device.deviceId;
                option.text = device.label || `Camera ${index + 1}`;
                deviceSelect.appendChild(option);
            });
            if (currentValue) {
                deviceSelect.value = currentValue;
            }
        } catch (err) {
            // Device enumeration is best-effort; capture still works without it.
            deviceRow.classList.add("hidden");
        }
    }

    deviceSelect.addEventListener("change", () => {
        startStream(deviceSelect.value);
    });

    captureBtn.addEventListener("click", () => {
        if (!video.videoWidth || !video.videoHeight) {
            setStatus("Camera is not ready yet — please wait a moment.", true);
            return;
        }

        // Draw at the video's native resolution to preserve full sensor detail.
        canvas.width = video.videoWidth;
        canvas.height = video.videoHeight;
        const ctx = canvas.getContext("2d");
        ctx.drawImage(video, 0, 0, canvas.width, canvas.height);

        // High-quality JPEG keeps the payload manageable while remaining
        // visually lossless for defect inspection purposes.
        const dataUrl = canvas.toDataURL("image/jpeg", 0.97);

        capturedPreview.src = dataUrl;
        capturedPreview.classList.remove("hidden");
        video.classList.add("hidden");
        deviceRow.classList.add("hidden");
        captureBtn.classList.add("hidden");
        retakeBtn.classList.remove("hidden");
        setStatus("Image captured at full resolution (" + canvas.width + " × " + canvas.height + ").", false);

        stopActiveStream();
        Streamlit.setComponentValue(dataUrl);
        Streamlit.setFrameHeight();
    });

    retakeBtn.addEventListener("click", () => {
        capturedPreview.classList.add("hidden");
        video.classList.remove("hidden");
        captureBtn.classList.remove("hidden");
        retakeBtn.classList.add("hidden");
        Streamlit.setComponentValue(null);
        startStream(deviceSelect.value || undefined);
    });

    // Initial boot.
    (async function init() {
        if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
            setStatus("This browser does not support camera access (getUserMedia).", true);
            captureBtn.disabled = true;
            return;
        }
        await startStream(undefined);
        Streamlit.setComponentReady();
        Streamlit.setFrameHeight();
    })();

    window.addEventListener("resize", () => Streamlit.setFrameHeight());
</script>

</body>
</html>
